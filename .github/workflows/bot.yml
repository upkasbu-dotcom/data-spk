name: Otomatisasi Bot SCM Nusadaya

on:
  schedule:
    # Berjalan otomatis setiap hari jam 07:00 WIB (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Tombol manual di halaman GitHub Actions

permissions:
  contents: write # Wajib agar bot bisa melakukan push/commit balik ke repo

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Source Code dari Repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Environment Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Library Python Pendukung
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests openpyxl PyGithub python-dotenv

    - name: Eksekusi Skrip Bot SCM
      env:
        USERNAME: ${{ secrets.SCM_USERNAME }}
        PASSWORD: ${{ secrets.SCM_PASSWORD }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TZ: Asia/Jakarta
      run: |
        python bot_scm.py

name: Otomatisasi Bot SCM Nusadaya

on:
  schedule:
    # Terjadwal otomatis berjalan setiap hari jam 07:00 WIB (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Mengaktifkan tombol "Run workflow" manual di tab Actions

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Source Code dari Repo
      uses: actions/checkout@v4

    - name: Setup Environment Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Google Chrome & Webdriver Bawaan Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Install Library Python Pendukung
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests openpyxl PyGithub

    - name: Eksekusi Skrip Bot SCM
      env:
        # Menghubungkan Secrets GitHub ke Kode Python
        USERNAME: ${{ secrets.SCM_USERNAME }}
        PASSWORD: ${{ secrets.SCM_PASSWORD }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python bot_scm.py
